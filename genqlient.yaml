# genqlient configuration. The schema is Stash's vendored SDL (schema/);
# operations and fragments are generated by genops ahead of genqlient (see
# generate.go). Custom scalars are bound to Go types per the SDK's §10 contract.
schema:
  - schema/*.graphql
  - schema/types/*.graphql

operations:
  - internal/gen/generated/*.graphql

generated: stash/operations_gen.go
package: stash

# Struct-typed fields become pointers: required so self-referential filter
# inputs (SceneFilterType.AND/OR/NOT, etc.) are not infinitely-sized value
# types, and it makes nullable entity edges pointer-canonical (e.g. *StudioRef).
use_struct_references: true

# Nullable fields become pointers with omitempty. On the input side this is a
# correctness requirement: a value-typed optional field is always marshalled, so
# an unset enum is sent as "" and the server rejects it (" is not a valid
# SortDirectionEnum"). Pointers let an unset optional field be omitted from the
# request. On the output side it distinguishes a JSON null from a zero value.
optional: pointer

bindings:
  Time:
    type: time.Time
  Int64:
    type: int64
  Timestamp:
    type: string
  Map:
    type: encoding/json.RawMessage
  Any:
    type: encoding/json.RawMessage
  BoolMap:
    type: "map[string]bool"
  PluginConfigMap:
    type: "map[string]interface{}"
  Upload:
    type: github.com/lightning-rider-999/go-stashapp/stash.Upload
